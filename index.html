<!DOCTYPE html>
<html lang="en">

<head>
    <link href="style.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="Hola">
    <title>Comparacion de numeros</title>

</head>

<body>
    <h1 id="titulo-h1"> Comparación de numeros  </h1>
    <br>
    <div class="contenedor-numeros">

        <h2>Ingrese el primer número:</h2> 
        <input type="number" id="numero1" placeholder="Número 1">
        <br>
        <h2>Ingrese el segundo número:</h2> 
        <input type="number" id="numero2" placeholder="Número 2">
        <br>
        <h2>Ingrese el tercer número:</h2> 
        <input type="number" id="numero3" placeholder="Número 3">
        <br>
        <br>

    </div>
    <div class="contenedor-boton-resultados">

        <button id="calcular">Calcular</button>
        <p class="resultado">Resultado: </p>
        <p id="resultado"> </p>

    </div>
    
</body>
    <script src="script.js"></script>
</html>
